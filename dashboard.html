/* ── INDEXEDDB HELPERS ───────────────────────────────────────────────── */
function openDocDB() {
  return new Promise((res, rej) => {
    try {
      const r = indexedDB.open('rce_docs_db', 1);
      r.onupgradeneeded = e => {
        try { e.target.result.createObjectStore('files'); } catch(err) {}
      };
      r.onsuccess = e => res(e.target.result);
      r.onerror = e => rej(e.target.error);
    } catch(e) { rej(e); }
  });
}
async function saveDocFile(id, arrayBuffer) {
  const db = await openDocDB();
  return new Promise((res, rej) => {
    const tx = db.transaction('files','readwrite');
    tx.objectStore('files').put(arrayBuffer, `doc_${id}`);
    tx.oncomplete = res; tx.onerror = rej;
  });
}
async function getDocFile(id) {
  const db = await openDocDB();
  return new Promise((res, rej) => {
    const tx = db.transaction('files','readonly');
    const req = tx.objectStore('files').get(`doc_${id}`);
    req.onsuccess = () => res(req.result); req.onerror = rej;
  });
}
async function deleteDocFile(id) {
  const db = await openDocDB();
  return new Promise((res, rej) => {
    const tx = db.transaction('files','readwrite');
    tx.objectStore('files').delete(`doc_${id}`);
    tx.oncomplete = res; tx.onerror = rej;
  });
}

/* ── DOC METADATA HELPERS ────────────────────────────────────────────── */
function getDocs(agentId) {
  const all = lsGet('rce_docs', []);
  return all.filter(d => d.agent_id === agentId);
}
function addDoc(meta) {
  const all = lsGet('rce_docs', []);
  all.push(meta);
  lsSet('rce_docs', all);
}
function removeDoc(id) {
  const all = lsGet('rce_docs', []);
  lsSet('rce_docs', all.filter(d => d.id !== id));
}
function formatBytes(b) {
  if (!b) return '';
  if (b < 1024) return b + ' B';
  if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
  return (b/1024/1024).toFixed(1) + ' MB';
}

/* ── STORAGE ─────────────────────────────────────────────────────────── */
// In-memory fallback when browser blocks localStorage (Edge Tracking Prevention)
const _mem = {};
function lsGet(k, fallback) {
  try {
    const v = localStorage.getItem(k);
    return v !== null ? JSON.parse(v) : (k in _mem ? _mem[k] : fallback);
  } catch(e) {
    return k in _mem ? _mem[k] : fallback;
  }
}
// lsSetLocal: write to storage only (no API sync — used for init and session)
function lsSetLocal(k, v) {
  try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {}
  _mem[k] = v;
}
// apiSave: fire-and-forget persist to Neon via serverless API
function apiSave(key, value) {
  fetch('/api/save', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({key, value})
  }).catch(() => {});
}
// lsSet: write locally AND push to API (used for all user-triggered saves)
function lsSet(k, v) {
  lsSetLocal(k, v);
  if (k === 'rce_agents')  apiSave('agents',  v);
  if (k === 'rce_users')   apiSave('users',   v);
  if (k === 'rce_history') apiSave('history', v);
}

function initials(name) {
  return name.split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase();
}
function userName(id, users) {
  const u = users.find(u=>u.id===id);
  return u ? u.name : '—';
}
function navigate(hash) {
  window.location.hash = hash;
}
function useHash() {
  const [hash, setHash] = useState(window.location.hash || '#/dashboard');
  useEffect(() => {
    const h = () => setHash(window.location.hash || '#/dashboard');
    window.addEventListener('hashchange', h);
    return () => window.removeEventListener('hashchange', h);
  }, []);
  return hash;
}

function Toast() {
  const [msg, setMsg] = useState(null);
  _setToast = m => { setMsg(m); setTimeout(()=>setMsg(null), 3200); };
  if (!msg) return null;
  return (
    <div className="toast fixed bottom-6 left-1/2 -translate-x-1/2 z-50 bg-sia-navy text-white text-sm font-semibold px-5 py-3 rounded-xl shadow-xl flex items-center gap-2">
      <IconCheck size={14} c="text-sia-teal"/>
      {msg}
    </div>
  );
}
function showToast(m) { _setToast && _setToast(m); }

/* ── DASHBOARD PAGE ─────────────────────────────────────────────────── */
function DashboardPage({user}) {
  const agents = getAgents() || [];
  const users  = getUsers()  || [];
  const history = getHistory();
  const [showRequestModal, setShowRequestModal] = useState(false);

  const byStatus = key => agents.filter(a=>a.build_status===key).length;
  const live     = byStatus('live');
  const total    = agents.length;
  const inBuild  = byStatus('in_building');
  const built    = byStatus('built');
  const tested   = byStatus('tested');

  const funnelStages = [
    {key:'poc_only',      label:'POC Only',      n: byStatus('poc_only')+byStatus('to_be_started'), color:'#64748b'},
    {key:'in_building',   label:'In Building',   n: inBuild,  color:'#d97706'},
    {key:'built',         label:'Built',         n: built,    color:'#7c3aed'},
    {key:'tested',        label:'Tested',        n: tested,   color:'#059669'},
    {key:'live',          label:'Live',          n: live,     color:'#ca8a04'},
  ];
  const maxF = Math.max(...funnelStages.map(s=>s.n), 1);

  // Builder workload
  const builders = users.filter(u=>u.role==='builder'||u.role==='admin');
  const builderLoad = builders.map(b => ({
    name: b.name.split(' ')[0],
    count: agents.filter(a=>a.builder_id===b.id && ['in_building','built','tested'].includes(a.build_status)).length,
  })).filter(b=>b.count>0).sort((a,b)=>b.count-a.count);
  const maxLoad = Math.max(...builderLoad.map(b=>b.count), 1);

  // Monthly completions (last 12 months from history)
  const now = new Date();
  const months = Array.from({length:12},(_,i)=>{
    const d = new Date(now.getFullYear(), now.getMonth()-11+i, 1);
    return {label: d.toLocaleDateString('en',{month:'short'}), year:d.getFullYear(), month:d.getMonth()};
  });
  const builtHistory = history.filter(h=>h.to==='built'||h.to==='live'||h.to==='tested');
  const monthCounts = months.map(m => ({
    ...m,
    n: builtHistory.filter(h=>{
      const d=new Date(h.date);
      return d.getFullYear()===m.year && d.getMonth()===m.month;
    }).length
  }));
  const maxM = Math.max(...monthCounts.map(m=>m.n), 1);

  return (
    <div className="space-y-6">
      {showRequestModal && (
        <RequestAgentModal user={user} onClose={()=>setShowRequestModal(false)}/>
      )}
      {/* Header */}
      <div className="rounded-2xl px-7 py-6 text-white relative overflow-hidden"
           style={{background:'linear-gradient(135deg,#001540 0%,#00205B 50%,#0062A3 80%,#009DC4 100%)'}}>
        <div className="absolute inset-0 pointer-events-none"
             style={{backgroundImage:'linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px)',backgroundSize:'32px 32px'}}/>
        <div className="relative z-10 flex items-center justify-between flex-wrap gap-4">
          <div>
            <p className="text-white/50 text-xs font-bold uppercase tracking-widest mb-1">Sia · FSI &amp; Tech BUs</p>
            <h1 className="text-2xl font-extrabold tracking-tight">RCE Agent Tracker</h1>
            <p className="text-white/55 text-sm mt-1">AI agent pipeline overview</p>
          </div>
          <div className="flex items-center gap-6">
            <div className="text-center">
              <div className="text-5xl font-black" style={{color:'#fbbf24'}}>{live}</div>
              <div className="text-white/50 text-xs font-bold uppercase tracking-widest mt-1">Live Agents</div>
            </div>
            <button onClick={()=>setShowRequestModal(true)}
                    className="flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-bold text-white whitespace-nowrap flex-shrink-0 hover:opacity-90 transition-opacity"
                    style={{background:'linear-gradient(135deg,#00205B 0%,#009DC4 100%)', border:'1.5px solid rgba(255,255,255,0.25)'}}>
              <span className="text-lg leading-none font-black">+</span> Request a new agent
            </button>
          </div>
        </div>
      </div>

      {/* KPI Cards */}
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
        {[
          {label:'Total Agents', n:total, color:'#00205B'},
          {label:'In Building',  n:inBuild, color:'#d97706'},
          {label:'Built',        n:built,   color:'#7c3aed'},
          {label:'Tested',       n:tested,  color:'#059669'},
        ].map(k=>(
          <div key={k.label} className="bg-white rounded-2xl border border-slate-100 px-5 py-4 shadow-sm">
            <div className="text-3xl font-black mb-1" style={{color:k.color}}>{k.n}</div>
            <div className="text-xs font-semibold text-slate-500">{k.label}</div>
          </div>
        ))}
      </div>

      {/* Funnel + Builder Workload */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        {/* Pipeline Funnel */}
        <div className="bg-white rounded-2xl border border-slate-100 p-5 shadow-sm">
          <h2 className="text-sm font-bold text-slate-800 mb-4">Pipeline Funnel</h2>
          <div className="space-y-3">
            {funnelStages.map(s=>(
              <div key={s.key}>
                <div className="flex items-center justify-between text-xs mb-1">
                  <span className="font-medium text-slate-600">{s.label}</span>
                  <span className="font-bold" style={{color:s.color}}>{s.n}</span>
                </div>
                <div className="h-6 bg-slate-100 rounded-full overflow-hidden">
                  <div className="h-full rounded-full transition-all"
                       style={{width:`${(s.n/maxF)*100}%`, background:s.color, minWidth: s.n>0?'24px':0}}/>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Builder Workload */}
        <div className="bg-white rounded-2xl border border-slate-100 p-5 shadow-sm">
          <h2 className="text-sm font-bold text-slate-800 mb-4">Builder Workload</h2>
          {builderLoad.length === 0 ? (
            <p className="text-sm text-slate-400">No active assignments</p>
          ) : (
            <div className="space-y-3">
              {builderLoad.map(b=>(
                <div key={b.name}>
                  <div className="flex items-center justify-between text-xs mb-1">
                    <span className="font-medium text-slate-600">{b.name}</span>
                    <span className="font-bold text-sia-mid">{b.count}</span>
                  </div>
                  <div className="h-5 bg-slate-100 rounded-full overflow-hidden">
                    <div className="h-full rounded-full transition-all"
                         style={{width:`${(b.count/maxLoad)*100}%`, background:'linear-gradient(90deg,#00205B,#009DC4)'}}/>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* Completion Trend */}
      <div className="bg-white rounded-2xl border border-slate-100 p-5 shadow-sm">
        <h2 className="text-sm font-bold text-slate-800 mb-4">Completion Trend (last 12 months)</h2>
        <div className="flex items-end gap-2 h-28">
          {monthCounts.map((m,i)=>(
            <div key={i} className="flex-1 flex flex-col items-center gap-1">
              <div className="w-full rounded-t-sm transition-all"
                   style={{height:`${maxM>0?(m.n/maxM)*96:4}px`, minHeight:'4px',
                           background: m.n>0 ? 'linear-gradient(180deg,#009DC4,#00205B)' : '#e2e8f0'}}/>
              <span className="text-[9px] text-slate-400 font-medium">{m.label}</span>
            </div>
          ))}
        </div>
        {builtHistory.length === 0 && (
          <p className="text-xs text-slate-400 mt-2">No status history recorded yet — history is created when you update statuses.</p>
        )}
      </div>
    </div>
  );
}

/* ── ALL AGENTS PAGE ─────────────────────────────────────────────────── */

        <select value={statusF} onChange={e=>setStatusF(e.target.value)}

/* ── DOC FILE TYPE ICON COLOR ────────────────────────────────────────── */
function docIconColor(type, name) {
  const ext = (name||'').split('.').pop().toLowerCase();
  if (['ppt','pptx'].includes(ext)) return '#ea580c';
  if (['doc','docx'].includes(ext)) return '#2563eb';
  if (['pdf'].includes(ext)) return '#dc2626';
  if (['xlsx','xls','csv'].includes(ext)) return '#16a34a';
  return '#64748b';
}

/* ── DOCUMENTS SECTION ───────────────────────────────────────────────── */
function DocumentsSection({agentId, user, canEdit, isBuilder}) {
  const [docs, setDocs] = useState([]);
  const [dragOver, setDragOver] = useState(false);
  const [uploading, setUploading] = useState(false);
  const fileInputRef = useRef(null);

  useEffect(() => {
    setDocs(getDocs(agentId));
  }, [agentId]);

  async function handleFiles(files) {
    if (!files || files.length === 0) return;
    setUploading(true);
    for (const file of Array.from(files)) {
      if (file.size > 50 * 1024 * 1024) {
        showToast(`"${file.name}" exceeds 50 MB limit — skipped`);
        continue;
      }
      try {
        const buf = await file.arrayBuffer();
        const id = Date.now() + Math.floor(Math.random()*1000);
        await saveDocFile(id, buf);
        const meta = {
          id,
          agent_id: agentId,
          name: file.name,
          size: file.size,
          type: file.type,
          uploaded_by_id: user.id,
          uploaded_at: new Date().toISOString(),
        };
        addDoc(meta);
        setDocs(getDocs(agentId));
        showToast(`"${file.name}" uploaded`);
      } catch(e) {
        showToast(`Failed to upload "${file.name}"`);
      }
    }
    setUploading(false);
  }

  function onDrop(e) {
    e.preventDefault();
    setDragOver(false);
    handleFiles(e.dataTransfer.files);
  }

  async function downloadDoc(doc) {
    try {
      const buf = await getDocFile(doc.id);
      if (!buf) { showToast('File not found in storage'); return; }
      const blob = new Blob([buf], {type: doc.type || 'application/octet-stream'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = doc.name;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    } catch(e) {
      showToast('Download failed');
    }
  }

  async function deleteDoc(doc) {
    try {
      await deleteDocFile(doc.id);
    } catch(e) { /* ignore */ }
    removeDoc(doc.id);
    setDocs(getDocs(agentId));
    showToast(`"${doc.name}" deleted`);
  }

  return (
    <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
      <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4 flex items-center gap-2">
        <IconPaperclip size={13} c="text-slate-400"/> Documents
      </p>

      {/* Upload zone — only for canEdit && isBuilder */}
      {canEdit && isBuilder && (
        <div
          className={`drop-zone rounded-xl px-5 py-7 text-center mb-4 cursor-pointer select-none ${dragOver ? 'dragover' : ''}`}
          onDragOver={e=>{e.preventDefault();setDragOver(true);}}
          onDragLeave={()=>setDragOver(false)}
          onDrop={onDrop}
          onClick={()=>fileInputRef.current && fileInputRef.current.click()}
        >
          <input ref={fileInputRef} type="file" className="hidden"
                 accept=".ppt,.pptx,.docx,.doc,.pdf,.xlsx,.xls,.csv"
                 multiple
                 onChange={e=>handleFiles(e.target.files)}/>
          <IconPaperclip size={22} c="text-slate-300 mx-auto mb-2"/>
          <p className="text-sm text-slate-500 font-medium">
            {uploading ? 'Uploading…' : 'Drop files here or browse'}
          </p>
          <p className="text-xs text-slate-400 mt-1">PPT, PPTX, DOCX, PDF, XLSX up to 50 MB</p>
        </div>
      )}

      {/* Doc list */}
      {docs.length === 0 ? (
        <p className="text-sm text-slate-400">No documents attached yet.</p>
      ) : (
        <div className="space-y-1">
          {docs.map(doc => (
            <div key={doc.id} className="doc-row flex items-center gap-3 px-3 py-2.5 rounded-xl">
              <div className="flex-shrink-0">
                <div className="w-8 h-8 rounded-lg flex items-center justify-center"
                     style={{background: docIconColor(doc.type, doc.name) + '18'}}>
                  <IconFile size={14} c="" style={{color: docIconColor(doc.type, doc.name)}}/>

              </div>
              <div className="flex-1 min-w-0">
                <div className="text-sm font-medium text-slate-700 truncate">{doc.name}</div>
                <div className="text-[11px] text-slate-400">
                  {formatBytes(doc.size)} · {new Date(doc.uploaded_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}
                </div>
              </div>
              <div className="flex items-center gap-1.5 flex-shrink-0">
                <button onClick={()=>downloadDoc(doc)}
                        className="p-1.5 rounded-lg text-slate-400 hover:text-sia-teal hover:bg-sia-ice transition-colors"
                        title="Download">
                  <IconDownload size={14}/>
                </button>
                {canEdit && isBuilder && (
                  <button onClick={()=>deleteDoc(doc)}
                          className="p-1.5 rounded-lg text-slate-300 hover:text-red-500 hover:bg-red-50 transition-colors"
                          title="Delete">
                    <IconTrash size={14}/>
                  </button>
                )}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── AGENT DETAIL PAGE ───────────────────────────────────────────────── */
function AgentDetailPage({user, agentId}) {
  const id = parseInt(agentId);
  const [agents, setAgents] = useState(getAgents() || []);
  const users = getUsers() || [];
  const [history, setHistory] = useState(getHistory());
  const [showStatusPanel, setShowStatusPanel] = useState(false);
  const [showEditPanel, setShowEditPanel] = useState(false);
  const [newStatus, setNewStatus] = useState('');
  const [comment, setComment] = useState('');
  const [editForm, setEditForm] = useState(null);

  const agent = agents.find(a=>a.id===id);
  if (!agent) return <div className="text-slate-500 p-8">Agent not found. <a href="#/agents" className="text-sia-teal underline">Back to agents</a></div>;

  const canEdit = user && ['builder','admin'].includes(user.role);
  const isBuilder = user && (agent.builder_id === user.id || user.role === 'admin');
  const agentHistory = history.filter(h=>h.agent_id===id).sort((a,b)=>new Date(b.date)-new Date(a.date));

  const stepIdx = BUILD_STEPS.indexOf(agent.build_status);

  function saveStatus() {
    if (!newStatus) return;
    const cur = agents.find(a=>a.id===id);
    const isAdminOrValidator = user && ['admin','validator'].includes(user.role);
    const isRequestor = user && cur.requestor_id === user.id;
    // Requestor-testing gate: only requestor (or admin) can mark as tested
    if (newStatus === 'tested' && cur.build_status === 'requestor_testing' && !isRequestor && user?.role !== 'admin') {
      showToast('Only the requestor can confirm testing is complete'); return;
    }
    // Pre-live gate: non-admin/validator cannot directly set live — queue instead
    if (newStatus === 'live' && !isAdminOrValidator) {
      const updated = agents.map(a => a.id===id ? {...a, live_approval_pending:true} : a);
      saveAgents(updated);
      setAgents(updated);
      setShowStatusPanel(false); setNewStatus(''); setComment('');
      showToast('Submitted for live approval — an admin or validator will review');
      return;
    }
    const patch = {build_status:newStatus};
    if (newStatus === 'live') patch.live_approval_pending = false;
    const updated = agents.map(a => a.id===id ? {...a, ...patch} : a);
    saveAgents(updated);
    const h = [...history, {
      id: Date.now(), agent_id:id, from:cur.build_status, to:newStatus,
      user_id:user.id, user_name:user.name, comment, date:new Date().toISOString()
    }];
    saveHistory(h);
    setAgents(updated);
    setHistory(h);
    setShowStatusPanel(false);
    setNewStatus('');
    setComment('');
    showToast('Status updated successfully');
  }

  function saveEdit() {
    if (!editForm) return;
    const updated = agents.map(a => a.id===id ? {...a, ...editForm} : a);
    saveAgents(updated);
    setAgents(updated);
    setShowEditPanel(false);
    showToast('Agent updated successfully');
  }

  function openEdit() {
    setEditForm({
      name: agent.name,
      description: agent.description || '',
      business_justification: agent.business_justification || '',
      priority: agent.priority,
      siagpt_link: agent.siagpt_link || '',
      claude_skill_link: agent.claude_skill_link || '',
      other_link: agent.other_link || '',
      notes: agent.notes || '',

    setShowEditPanel(true);
  }

  const currentAgent = agents.find(a=>a.id===id);

  return (
    <div className="space-y-5 max-w-3xl">
      {/* Back + Header */}
      <button onClick={()=>navigate('#/agents')}

      <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">

/* ── MY AGENTS PAGE ─────────────────────────────────────────────────── */
function MyAgentsPage({user}) {
  const [agents, setAgents] = useState(getAgents() || []);
  const users = getUsers() || [];
  const [history, setHistory] = useState(getHistory());

  if (!user) return null;

  let myAgents;
  if (user.role === 'builder' || user.role === 'admin') {
    myAgents = agents.filter(a => a.builder_id === user.id);
  } else {
    myAgents = agents.filter(a => a.requestor_id === user.id);
  }

  const NEXT_STATUS = {to_be_started:'in_building', in_building:'built', built:'requestor_testing', requestor_testing:'tested', tested:'live'};

  function advance(agent) {
    const next = NEXT_STATUS[agent.build_status];
    if (!next) return;
    const updated = agents.map(a => a.id===agent.id ? {...a,build_status:next} : a);
    saveAgents(updated);
    const h = [...history, {
      id:Date.now(), agent_id:agent.id, from:agent.build_status, to:next,
      user_id:user.id, user_name:user.name, comment:'', date:new Date().toISOString()
    }];
    saveHistory(h);
    setAgents(updated);
    setHistory(h);
    showToast(`Status advanced to "${STATUS_CFG[next].label}"`);
  }

  const isBuilderOrAdmin = user.role === 'builder' || user.role === 'admin';

  return (
    <div className="space-y-4">
      <h1 className="text-xl font-extrabold text-slate-800">My Agents <span className="text-slate-400 font-normal text-base">({myAgents.length})</span></h1>
      {myAgents.length === 0 ? (
        <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-10 text-center">
          <p className="text-slate-400 text-sm">No agents assigned to you.</p>
        </div>
      ) : (
        <div className="space-y-2">
          {myAgents.map(a => {
            const next = NEXT_STATUS[a.build_status];
            return (
              <div key={a.id} className="bg-white rounded-xl border border-slate-100 shadow-sm px-5 py-4 flex items-center gap-4 flex-wrap">
                <div className="flex-1 min-w-0">
                  <div className="font-semibold text-slate-800 text-sm cursor-pointer hover:text-sia-teal truncate"
                       onClick={()=>navigate(`#/agents/${a.id}`)}>{a.name}</div>
                  <div className="flex items-center gap-2 mt-1 flex-wrap">
                    <StatusBadge status={a.build_status}/>
                    <PriorityBadge priority={a.priority}/>
                    {isBuilderOrAdmin && <span className="text-xs text-slate-400">Req: {userName(a.requestor_id, users)}</span>}
                  </div>
                </div>
                <div className="flex items-center gap-2 flex-shrink-0">
                  {a.siagpt_link && (
                    <a href={a.siagpt_link} target="_blank" rel="noopener noreferrer"
                       className="text-sia-teal text-xs font-medium flex items-center gap-1 hover:underline">
                      SiaGPT <IconExtLink size={11}/>
                    </a>
                  )}
                  {isBuilderOrAdmin && next && (
                    <button onClick={()=>advance(a)}
                            className="px-3 py-1.5 rounded-lg text-xs font-semibold bg-sia-navy text-white hover:bg-sia-mid transition-colors">
                      → {STATUS_CFG[next].label}
                    </button>
                  )}
                  <button onClick={()=>navigate(`#/agents/${a.id}`)}
                          className="text-slate-400 hover:text-slate-700">
                    <IconChevron size={16} dir="right"/>
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ── BACKLOG PAGE ────────────────────────────────────────────────────── */
function BacklogPage({user}) {
  const [agents, setAgents] = useState(getAgents() || []);
  const users = getUsers() || [];
  const [assignTarget, setAssignTarget] = useState({});

  const isAdmin = user?.role === 'admin';
  const isBuilder = user?.role === 'builder';
  const builders = users.filter(u => ['builder','admin'].includes(u.role));

  const backlog = agents.filter(a => a.validation_status === 'approved' && !a.builder_id);

  function assign(agent, builderId) {
    const assignee = users.find(u => u.id === builderId);
    const updated = agents.map(a => a.id===agent.id ? {...a, builder_id:builderId, build_status:'to_be_started'} : a);
    saveAgents(updated);
    setAgents(updated);
    showToast(builderId === user.id ? `You're now building "${agent.name}"` : `Assigned to ${assignee?.name}`);
  }

  return (
    <div className="space-y-4">
      <div>
        <h1 className="text-xl font-extrabold text-slate-800">Build Backlog</h1>
        <p className="text-sm text-slate-500 mt-1">
          Approved agents without a builder.
          {isAdmin ? ' Self-assign or assign any builder.' : ' Self-assign to start building.'}
        </p>
      </div>
      {backlog.length === 0 ? (
        <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-10 text-center">
          <p className="text-slate-400 text-sm">Backlog is empty — all approved agents have a builder.</p>
        </div>
      ) : (
        <div className="space-y-2">
          {backlog.map(a => (
            <div key={a.id} className="bg-white rounded-xl border border-slate-100 shadow-sm px-5 py-4 flex items-center gap-4 flex-wrap">
              <div className="flex-1 min-w-0">
                <div className="font-semibold text-slate-800 text-sm cursor-pointer hover:text-sia-teal truncate"
                     onClick={()=>navigate(`#/agents/${a.id}`)}>{a.name}</div>
                <div className="flex items-center gap-2 mt-1 flex-wrap">
                  <PriorityBadge priority={a.priority}/>
                  <span className="text-xs text-slate-400">Requested by {userName(a.requestor_id, users)}</span>
                </div>
              </div>
              <div className="flex items-center gap-2 flex-shrink-0 flex-wrap">
                {/* Self-assign: available to both builders and admins */}
                {(isBuilder || isAdmin) && (
                  <button onClick={()=>assign(a, user.id)}
                          className="px-3 py-1.5 rounded-lg text-xs font-semibold bg-sia-teal text-white hover:bg-sia-navy transition-colors">
                    Self-assign
                  </button>
                )}
                {/* Assign to builder: admin only */}
                {isAdmin && (
                  <div className="flex items-center gap-1.5">
                    <select
                      value={assignTarget[a.id] || ''}
                      onChange={e => setAssignTarget({...assignTarget, [a.id]: parseInt(e.target.value)})}
                      className="border border-slate-200 rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-sia-teal/30 bg-white">
                      <option value="">Assign to…</option>
                      {builders.filter(b => b.id !== user.id).map(b => (
                        <option key={b.id} value={b.id}>{b.name}</option>
                      ))}
                    </select>
                    <button
                      onClick={()=>{ if(assignTarget[a.id]) assign(a, assignTarget[a.id]); }}
                      disabled={!assignTarget[a.id]}
                      className="px-3 py-1.5 rounded-lg text-xs font-semibold border border-sia-navy text-sia-navy hover:bg-sia-navy hover:text-white transition-colors disabled:opacity-30 disabled:cursor-not-allowed">
                      Assign
                    </button>
                  </div>
                )}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── VALIDATION QUEUE PAGE ───────────────────────────────────────────── */
function ValidationQueuePage({user}) {
  const [agents, setAgents] = useState(getAgents() || []);
  const users = getUsers() || [];
  const [comments, setComments] = useState({});
  const [checklist, setChecklist] = useState({});

  const LIVE_CHECKS = [
    {key:'tested',    label:'Agent has been tested by the requestor'},
    {key:'docs',      label:'Documentation or description is complete'},
    {key:'security',  label:'No sensitive data or security concerns identified'},
    {key:'scope',     label:'Scope and expected users are clearly defined'},
  ];

  // New agent intake (initial approval gate)
  const pendingIntake = agents.filter(a => a.validation_status === 'pending');
  // Pre-live quality gate (builder submitted for live, awaiting admin/validator)
  const pendingLive = agents.filter(a => a.live_approval_pending === true);

  function decideIntake(agent, decision) {
    const updated = agents.map(a => a.id===agent.id ? {...a, validation_status:decision} : a);
    saveAgents(updated);
    setAgents(updated);
    showToast(`Agent ${decision === 'approved' ? 'approved for build' : 'rejected'}`);
  }

  function decideLive(agent, decision) {
    const patch = decision === 'approved'
      ? {build_status:'live', live_approval_pending:false}
      : {live_approval_pending:false};
    const updated = agents.map(a => a.id===agent.id ? {...a, ...patch} : a);
    saveAgents(updated);
    setAgents(updated);
    showToast(decision === 'approved' ? 'Agent is now live!' : 'Live request rejected');
  }

  function allChecked(agentId) {
    const c = checklist[agentId] || {};
    return LIVE_CHECKS.every(ch => c[ch.key]);
  }

  function toggleCheck(agentId, key) {
    const prev = checklist[agentId] || {};
    setChecklist({...checklist, [agentId]: {...prev, [key]: !prev[key]}});
  }

  function AgentCard({a, borderColor, children}) {
    return (
      <div className="bg-white rounded-xl border shadow-sm p-5" style={{borderColor}}>
        <div className="flex items-start justify-between gap-4 flex-wrap">
          <div className="flex-1 min-w-0">
            <a href={`#/agents/${a.id}`} className="font-bold text-slate-800 hover:text-sia-teal">{a.name}</a>
            <div className="flex gap-2 mt-1.5 flex-wrap">
              <PriorityBadge priority={a.priority}/>
              <StatusBadge status={a.build_status}/>
              <span className="text-xs text-slate-400">by {userName(a.requestor_id, users)}</span>
            </div>
            {a.description && <p className="text-xs text-slate-500 mt-2">{a.description}</p>}
            {a.business_justification && <p className="text-xs text-slate-400 mt-1 italic">{a.business_justification}</p>}
            {a.use_case_category && <p className="text-xs text-slate-400 mt-0.5">Category: {a.use_case_category} {a.business_unit ? `· ${a.business_unit}` : ''}</p>}
            {a.testers && a.testers.length > 0 && (
              <p className="text-xs text-slate-400 mt-0.5">Testers: {a.testers.map(tid=>userName(tid,users)).join(', ')}</p>
            )}
          </div>
        </div>
        {children}
      </div>
    );
  }

  return (
    <div className="space-y-6">
      <div>
        <h1 className="text-xl font-extrabold text-slate-800">Validation Queue</h1>
        <p className="text-sm text-slate-500 mt-1">Review new agent requests and approve agents for live deployment.</p>
      </div>

      {/* Section 1: Pre-live quality gate */}
      <div className="space-y-3">
        <h2 className="text-sm font-bold text-slate-600 uppercase tracking-wider flex items-center gap-2">
          <span className="w-2 h-2 rounded-full bg-amber-400 inline-block"/>
          Awaiting Live Approval ({pendingLive.length})
        </h2>
        {pendingLive.length === 0 ? (
          <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 text-center">
            <p className="text-slate-400 text-sm">No agents pending live approval.</p>
          </div>
        ) : pendingLive.map(a => (
          <AgentCard key={a.id} a={a} borderColor="#fcd34d">
            {/* Quality checklist */}
            <div className="mt-4 p-3 bg-amber-50 rounded-lg border border-amber-100 space-y-2">
              <p className="text-xs font-bold text-amber-700 uppercase tracking-wider mb-1">Quality checklist</p>
              {LIVE_CHECKS.map(ch=>(
                <label key={ch.key} className="flex items-center gap-2 cursor-pointer">
                  <input type="checkbox"
                         checked={!!(checklist[a.id]||{})[ch.key]}
                         onChange={()=>toggleCheck(a.id, ch.key)}
                         className="rounded"/>
                  <span className="text-xs text-slate-700">{ch.label}</span>
                </label>
              ))}
            </div>
            <div className="mt-3">
              <textarea value={comments[`live_${a.id}`]||''}
                        onChange={e=>setComments({...comments,[`live_${a.id}`]:e.target.value})}
                        placeholder="Decision rationale (optional)…" rows={2}
                        className="w-full border border-slate-200 rounded-lg px-3 py-2 text-xs focus:outline-none focus:ring-2 focus:ring-sia-teal/30 resize-none"/>
              <div className="flex gap-2 mt-2">
                <button onClick={()=>decideLive(a,'approved')}
                        disabled={!allChecked(a.id)}
                        className="px-4 py-2 rounded-lg bg-emerald-600 text-white text-xs font-bold hover:bg-emerald-700 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
                  Approve &amp; Go Live
                </button>
                <button onClick={()=>decideLive(a,'rejected')}
                        className="px-4 py-2 rounded-lg bg-red-100 text-red-700 text-xs font-bold hover:bg-red-200 transition-colors">
                  Reject
                </button>
              </div>
              {!allChecked(a.id) && <p className="text-[10px] text-amber-600 mt-1">Complete all checklist items to approve.</p>}
            </div>
          </AgentCard>
        ))}
      </div>

      {/* Section 2: New agent intake */}
      <div className="space-y-3">
        <h2 className="text-sm font-bold text-slate-600 uppercase tracking-wider flex items-center gap-2">
          <span className="w-2 h-2 rounded-full bg-blue-400 inline-block"/>
          New Agent Requests ({pendingIntake.length})
        </h2>
        {pendingIntake.length === 0 ? (
          <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 text-center">
            <p className="text-slate-400 text-sm">No new agent requests pending.</p>
          </div>
        ) : pendingIntake.map(a => (
          <AgentCard key={a.id} a={a} borderColor="#bfdbfe">
            <div className="mt-4">
              <textarea value={comments[a.id]||''} onChange={e=>setComments({...comments,[a.id]:e.target.value})}
                        placeholder="Decision rationale (optional)…" rows={2}
                        className="w-full border border-slate-200 rounded-lg px-3 py-2 text-xs focus:outline-none focus:ring-2 focus:ring-sia-teal/30 resize-none"/>
              <div className="flex gap-2 mt-2">
                <button onClick={()=>decideIntake(a,'approved')}
                        className="px-4 py-2 rounded-lg bg-emerald-600 text-white text-xs font-bold hover:bg-emerald-700 transition-colors">
                  Approve
                </button>
                <button onClick={()=>decideIntake(a,'rejected')}
                        className="px-4 py-2 rounded-lg bg-red-100 text-red-700 text-xs font-bold hover:bg-red-200 transition-colors">
                  Reject
                </button>
              </div>
            </div>
          </AgentCard>
        ))}
      </div>
    </div>
  );
}

/* ── REQUEST AGENT MODAL ────────────────────────────────────────────── */
function RequestAgentModal({user, onClose, onSubmitted}) {
  const allUsers = getUsers() || [];
  const [form, setForm] = useState({
    name:'', description:'', business_justification:'', priority:'medium',
    business_unit:'', use_case_category:'', expected_users:'', target_date:'',
    success_criteria:'', testers:[],
  });
  const [nameError, setNameError] = useState('');
  const [duplicates, setDuplicates] = useState([]);
  const [duplicateConfirmed, setDuplicateConfirmed] = useState(false);
  const [requestorTested, setRequestorTested] = useState(false);

  const BUS_UNITS = ['FSI','Technology','Change Management','Operations','Strategy','Other'];
  const USE_CASES = ['Automation','Research & Analysis','Communication','Reporting','Data Processing','Other'];

  // Fuzzy duplicate detection — Levenshtein-based similarity
  function similarity(a, b) {
    a = a.toLowerCase().trim(); b = b.toLowerCase().trim();
    if (!a || !b) return 0;
    if (a === b) return 1;
    if (b.includes(a) || a.includes(b)) return 0.85;
    const longer = a.length > b.length ? a : b;
    const shorter = a.length > b.length ? b : a;
    const costs = Array.from({length:shorter.length+1},(_,i)=>i);
    for (let i=1; i<=longer.length; i++) {
      let prev = i;
      for (let j=1; j<=shorter.length; j++) {
        const val = longer[i-1]===shorter[j-1] ? costs[j-1] : Math.min(costs[j-1],costs[j],prev)+1;
        costs[j-1] = prev; prev = val;
      }
      costs[shorter.length] = prev;
    }
    return (longer.length - costs[shorter.length]) / longer.length;
  }

  function checkDuplicates(name) {
    if (!name.trim()) { setDuplicates([]); return; }
    const agents = getAgents() || [];
    const found = agents.filter(a => similarity(name, a.name) >= 0.65);
    setDuplicates(found);
    if (found.length > 0) setDuplicateConfirmed(false);
  }

  function toggleTester(uid) {
    setForm(f => ({...f, testers: f.testers.includes(uid) ? f.testers.filter(t=>t!==uid) : [...f.testers, uid]}));
  }

  function handleSubmit(e) {
    e.preventDefault();
    if (!form.name.trim()) { setNameError('Agent name is required'); return; }
    if (duplicates.length > 0 && !duplicateConfirmed) { return; }
    if (!requestorTested) { return; }
    const agents = getAgents() || [];
    const maxId = agents.reduce((m,a) => Math.max(m, a.id||0), 0);
    const now = new Date().toISOString();
    const newAgent = {
      id: maxId + 1,
      name: form.name.trim(),
      description: form.description.trim(),
      business_justification: form.business_justification.trim(),
      priority: form.priority,
      business_unit: form.business_unit,
      use_case_category: form.use_case_category,
      expected_users: form.expected_users,
      target_date: form.target_date,
      success_criteria: form.success_criteria.trim(),
      testers: form.testers,
      build_status: 'to_be_started',
      validation_status: 'pending',
      requestor_id: user.id,
      builder_id: null,
      siagpt_link: null,
      created_at: now, updated_at: now,
    };
    saveAgents([...agents, newAgent]);
    showToast('Request submitted — a validator will review it shortly');
    onClose();
    if (onSubmitted) onSubmitted();
  }

  function onBackdrop(e) { if (e.target === e.currentTarget) onClose(); }
  useEffect(() => {
    function onKey(e) { if (e.key === 'Escape') onClose(); }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const inputCls = "w-full border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sia-teal/30";
  const selectCls = inputCls + " bg-white";

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4"
         style={{background:'rgba(0,0,0,0.55)'}} onClick={onBackdrop}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg flex flex-col overflow-hidden max-h-[90vh]">
        {/* Header */}
        <div className="px-6 py-5 flex items-center justify-between flex-shrink-0"
             style={{background:'linear-gradient(135deg,#00205B 0%,#009DC4 100%)'}}>
          <h2 className="text-base font-extrabold text-white tracking-tight">Request a new agent</h2>
          <button onClick={onClose} className="text-white/60 hover:text-white transition-colors"><IconX size={18}/></button>
        </div>

        {/* Form */}
        <form onSubmit={handleSubmit} className="px-6 py-5 space-y-4 overflow-y-auto flex-1">

          {/* Agent name + duplicate detection */}
          <div>
            <label className="text-xs font-bold text-slate-600 block mb-1">
              Agent name <span className="text-red-500">*</span>
            </label>
            <input value={form.name}
                   onChange={e=>{ setForm({...form,name:e.target.value}); setNameError(''); checkDuplicates(e.target.value); }}
                   placeholder="e.g. AML Screening Agent" className={inputCls}/>
            {nameError && <p className="text-xs text-red-500 mt-1">{nameError}</p>}
            {duplicates.length > 0 && (
              <div className="mt-2 p-3 bg-amber-50 border border-amber-200 rounded-xl">
                <p className="text-xs font-bold text-amber-700 mb-1">Similar agent{duplicates.length>1?'s':''} already exist:</p>
                {duplicates.map(d=>(
                  <div key={d.id} className="flex items-center gap-2 mb-1">
                    <StatusBadge status={d.build_status}/>
                    <a href={`#/agents/${d.id}`} target="_blank" rel="noopener noreferrer"
                       className="text-xs text-sia-teal underline font-medium">{d.name}</a>
                  </div>
                ))}
                <label className="flex items-center gap-2 mt-2 cursor-pointer">
                  <input type="checkbox" checked={duplicateConfirmed} onChange={e=>setDuplicateConfirmed(e.target.checked)}/>
                  <span className="text-xs text-amber-800 font-semibold">I confirm this is not a duplicate and want to proceed</span>
                </label>
              </div>
            )}
          </div>

          {/* Description */}
          <div>
            <label className="text-xs font-bold text-slate-600 block mb-1">Description <span className="text-red-500">*</span></label>
            <textarea value={form.description} onChange={e=>setForm({...form,description:e.target.value})}
                      placeholder="What will this agent do?" rows={3} className={inputCls + " resize-none"} required/>
          </div>

          {/* Business justification */}
          <div>
            <label className="text-xs font-bold text-slate-600 block mb-1">Business justification</label>
            <textarea value={form.business_justification} onChange={e=>setForm({...form,business_justification:e.target.value})}
                      placeholder="Why is it needed? What problem does it solve?" rows={2} className={inputCls + " resize-none"}/>
          </div>

          {/* Business unit + Use case category */}
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="text-xs font-bold text-slate-600 block mb-1">Business unit</label>
              <select value={form.business_unit} onChange={e=>setForm({...form,business_unit:e.target.value})} className={selectCls}>
                <option value="">Select…</option>
                {BUS_UNITS.map(u=><option key={u} value={u}>{u}</option>)}
              </select>
            </div>
            <div>
              <label className="text-xs font-bold text-slate-600 block mb-1">Use case category</label>
              <select value={form.use_case_category} onChange={e=>setForm({...form,use_case_category:e.target.value})} className={selectCls}>
                <option value="">Select…</option>
                {USE_CASES.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
            </div>
          </div>

          {/* Expected users + Target date */}
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="text-xs font-bold text-slate-600 block mb-1">Expected users</label>
              <input type="number" min="1" value={form.expected_users}
                     onChange={e=>setForm({...form,expected_users:e.target.value})}
                     placeholder="e.g. 50" className={inputCls}/>
            </div>
            <div>
              <label className="text-xs font-bold text-slate-600 block mb-1">Target go-live date</label>
              <input type="date" value={form.target_date}
                     onChange={e=>setForm({...form,target_date:e.target.value})}
                     className={inputCls}/>
            </div>
          </div>

          {/* Success criteria */}
          <div>
            <label className="text-xs font-bold text-slate-600 block mb-1">Success criteria</label>
            <textarea value={form.success_criteria} onChange={e=>setForm({...form,success_criteria:e.target.value})}
                      placeholder="How will we know this agent is working well?" rows={2} className={inputCls + " resize-none"}/>

          {/* Priority */}
          <div>
            <label className="text-xs font-bold text-slate-600 block mb-2">Priority</label>

          </div>
        </form>
      </div>
    </div>

/* ── IMPORT PAGE ─────────────────────────────────────────────────────── */
function ImportPage({user}) {
  const [dragOver, setDragOver] = useState(false);
  const [result, setResult] = useState(null);
  const [processing, setProcessing] = useState(false);
  const fileInputRef = useRef(null);

  function resolveHeader(raw) {
    const norm = (raw||'').toString().toLowerCase().trim();
    for (const [field, aliases] of Object.entries(COL_MAP)) {
      if (aliases.includes(norm)) return field;
    }
    return null;
  }

  function processWorkbook(wb) {
    const sheetName = wb.SheetNames[0];
    const ws = wb.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
    if (rows.length < 2) { showToast('Sheet appears empty'); return; }

    const headers = rows[0].map(h => resolveHeader(h));
    const agents = getAgents() || [];
    const maxId = agents.reduce((m,a) => Math.max(m, a.id||0), 0);
    let added = 0, updated = 0;
    let nextId = maxId + 1;

    const updated_agents = [...agents];

    for (let i = 1; i < rows.length; i++) {
      const row = rows[i];
      const record = {};
      headers.forEach((field, idx) => {
        if (field) record[field] = (row[idx]||'').toString().trim();
      });

      if (!record.name) continue;

      // Normalize priority
      if (record.priority) {
        const p = record.priority.toLowerCase();
        record.priority = VALID_PRIORITIES.includes(p) ? p : 'medium';
      } else {
        record.priority = 'medium';
      }

      // Normalize build_status
      if (record.build_status) {
        const s = record.build_status.toLowerCase().replace(/ /g,'_');
        record.build_status = VALID_BUILD_STATUSES.includes(s) ? s : 'to_be_started';
      } else {
        record.build_status = 'to_be_started';
      }

      const existingIdx = updated_agents.findIndex(
        a => a.name.toLowerCase().trim() === record.name.toLowerCase()
      );

      if (existingIdx >= 0) {
        updated_agents[existingIdx] = {
          ...updated_agents[existingIdx],
          priority: record.priority || updated_agents[existingIdx].priority,
          build_status: record.build_status || updated_agents[existingIdx].build_status,
          description: record.description !== undefined ? record.description : updated_agents[existingIdx].description,
          business_justification: record.business_justification !== undefined ? record.business_justification : updated_agents[existingIdx].business_justification,
          siagpt_link: record.siagpt_link || updated_agents[existingIdx].siagpt_link,
        };
        updated++;
      } else {
        updated_agents.push({
          id: nextId++,
          name: record.name,
          description: record.description || '',
          business_justification: record.business_justification || '',
          priority: record.priority,
          build_status: record.build_status,
          siagpt_link: record.siagpt_link || null,
          requestor_id: user.id,
          builder_id: null,
          validation_status: 'approved',
        });
        added++;
      }
    }

    saveAgents(updated_agents);
    setResult({added, updated});
    showToast(`Import complete: ${added} added, ${updated} updated`);
  }

  function handleFile(file) {
    if (!file) return;
    setProcessing(true);
    setResult(null);
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, {type:'array'});
        processWorkbook(wb);
      } catch(err) {
        showToast('Failed to parse file');
      }
      setProcessing(false);
    };
    reader.readAsArrayBuffer(file);
  }

  function onDrop(e) {
    e.preventDefault();
    setDragOver(false);
    const file = e.dataTransfer.files[0];
    handleFile(file);
  }

  function downloadTemplate() {
    const headers = ['Name','Description','Business Justification','Priority','Build Status','SiaGPT Link'];

    const wb = XLSX.utils.book_new();

    XLSX.writeFile(wb, 'rce_agents_template.xlsx');

      <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">

function TeamPage({user}) {
  const [users, setUsers] = useState(getUsers() || []);
  const [editingId, setEditingId] = useState(null);
  const [editForm, setEditForm] = useState({});
  const [newForm, setNewForm] = useState({name:'', email:'', role:'requestor'});
  const [newError, setNewError] = useState('');

  function reload() { setUsers(getUsers() || []); }

  function toggleActive(u) {
    const updated = users.map(x => x.id === u.id ? {...x, active: x.active === false ? true : false} : x);
    saveUsers(updated);
    setUsers(updated);
    showToast(`${u.name} ${u.active === false ? 'reactivated' : 'deactivated'}`);
  }

  function startEdit(u) {
    setEditingId(u.id);
    setEditForm({name: u.name, email: u.email, role: u.role});
  }

  function cancelEdit() { setEditingId(null); setEditForm({}); }

  function saveEdit(u) {
    if (!editForm.name.trim() || !editForm.email.trim()) {
      showToast('Name and email are required'); return;
    }
    if (u.id === user.id && editForm.role !== 'admin') {
      if (!window.confirm('You are changing your own role away from admin. You will lose admin access. Continue?')) return;
    }
    const updated = users.map(x => x.id === u.id ? {...x, name:editForm.name.trim(), email:editForm.email.trim(), role:editForm.role} : x);
    saveUsers(updated);
    setUsers(updated);
    setEditingId(null);
    showToast('User updated');
  }

  function removeUser(u) {
    if (u.id === user.id) { showToast('You cannot remove yourself'); return; }
    if (!window.confirm(`Remove ${u.name} from the team? This cannot be undone.`)) return;
    const updated = users.filter(x => x.id !== u.id);
    saveUsers(updated);
    setUsers(updated);
    showToast(`${u.name} removed`);
  }

  function addUser(e) {
    e.preventDefault();
    setNewError('');
    if (!newForm.name.trim()) { setNewError('Name is required'); return; }
    if (!newForm.email.trim()) { setNewError('Email is required'); return; }
    const maxId = users.reduce((m, u) => Math.max(m, u.id || 0), 0);
    const newUser = {id: maxId + 1, name: newForm.name.trim(), email: newForm.email.trim(), role: newForm.role, active: true};
    const updated = [...users, newUser];
    saveUsers(updated);
    setUsers(updated);
    setNewForm({name:'', email:'', role:'requestor'});
    showToast(`${newUser.name} added to the team`);
  }

  const roleOrder = {admin:0, validator:1, builder:2, requestor:3};

             style={{backgroundImage:'linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px)',backgroundSize:'32px 32px'}}/>

            <p className="text-white/55 text-sm mt-0.5">Manage user access, roles, and account status.</p>

            <div className="text-3xl font-black text-white">{users.length}</div>
            <div className="text-white/50 text-xs font-bold uppercase tracking-widest mt-0.5">Members</div>

        <form onSubmit={addUser} className="flex flex-wrap gap-3 items-end">

            <input value={newForm.name} onChange={e=>setNewForm({...newForm,name:e.target.value})}
                   placeholder="Full name"
                   className="border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sia-teal/30"/>

              <th className="text-left px-4 py-3 text-xs font-bold text-slate-400 uppercase tracking-wider">Role</th>
              <th className="text-left px-4 py-3 text-xs font-bold text-slate-400 uppercase tracking-wider">Status</th>
              <th className="px-4 py-3 text-xs font-bold text-slate-400 uppercase tracking-wider text-right">Actions</th>
            </tr>
          </thead>
          <tbody>
            {sorted.map(u => {
              const inactive = u.active === false;
              const isEditing = editingId === u.id;
              const isSelf = u.id === user.id;
              return (
                <React.Fragment key={u.id}>
                  <tr className={`border-b border-slate-50 transition-colors ${inactive ? 'opacity-50' : 'hover:bg-slate-50'}`}>
                    <td className="px-5 py-3">
                      <div className="flex items-center gap-2.5">
                        <div className="w-7 h-7 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0"
                             style={{background: inactive ? '#94a3b8' : (ROLE_COLORS[u.role]||'#475569')}}>
                          {initials(u.name)}
                        </div>
                        <span className={`font-medium text-slate-800 ${inactive ? 'italic' : ''}`}>
                          {u.name}
                          {isSelf && <span className="ml-1.5 text-[10px] text-sia-teal font-bold">(you)</span>}
                        </span>
                      </div>
                    </td>
                    <td className="px-4 py-3 text-slate-500 text-xs hidden sm:table-cell">{u.email}</td>
                    <td className="px-4 py-3"><RoleBadge role={u.role}/></td>
                    <td className="px-4 py-3">
                      {inactive
                        ? <span className="text-xs font-semibold px-2 py-0.5 rounded-full bg-slate-100 text-slate-400">Inactive</span>
                        : <span className="text-xs font-semibold px-2 py-0.5 rounded-full bg-emerald-50 text-emerald-700">Active</span>
                      }
                    </td>
                    <td className="px-4 py-3">
                      <div className="flex items-center gap-1.5 justify-end">
                        <button onClick={()=>toggleActive(u)}
                                title={inactive ? 'Reactivate' : 'Deactivate'}
                                className={`px-2.5 py-1.5 rounded-lg text-xs font-semibold border transition-colors ${inactive ? 'border-emerald-200 text-emerald-700 hover:bg-emerald-50' : 'border-slate-200 text-slate-500 hover:bg-slate-50'}`}>
                          {inactive ? 'Reactivate' : 'Deactivate'}
                        </button>
                        <button onClick={()=> isEditing ? cancelEdit() : startEdit(u)}
                                className="p-1.5 rounded-lg text-slate-400 hover:text-sia-navy hover:bg-slate-100 transition-colors"
                                title="Edit">
                          {isEditing ? <IconX size={14}/> : <IconEdit size={14}/>}
                        </button>
                        <button onClick={()=>removeUser(u)}
                                className={`p-1.5 rounded-lg transition-colors ${isSelf ? 'text-slate-200 cursor-not-allowed' : 'text-slate-300 hover:text-red-500 hover:bg-red-50'}`}
                                title={isSelf ? 'Cannot remove yourself' : 'Remove user'}>
                          <IconTrash size={14}/>
                        </button>
                      </div>
                    </td>
                  </tr>
                  {isEditing && (
                    <tr className="bg-slate-50 border-b border-slate-100">
                      <td colSpan={5} className="px-5 py-4">
                        <div className="flex flex-wrap gap-3 items-end">
                          <div className="flex flex-col gap-1 flex-1 min-w-36">
                            <label className="text-xs font-semibold text-slate-500">Name</label>
                            <input value={editForm.name} onChange={e=>setEditForm({...editForm,name:e.target.value})}
                                   className="border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sia-teal/30"/>
                          </div>
                          <div className="flex flex-col gap-1 flex-1 min-w-48">
                            <label className="text-xs font-semibold text-slate-500">Email</label>
                            <input value={editForm.email} onChange={e=>setEditForm({...editForm,email:e.target.value})}
                                   type="email"
                                   className="border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sia-teal/30"/>
                          </div>
                          <div className="flex flex-col gap-1">
                            <label className="text-xs font-semibold text-slate-500">Role</label>
                            <select value={editForm.role} onChange={e=>setEditForm({...editForm,role:e.target.value})}
                                    className="border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sia-teal/30">
                              <option value="admin">Admin</option>
                              <option value="validator">Validator</option>
                              <option value="builder">Builder</option>
                              <option value="requestor">Requestor</option>
                            </select>
                          </div>
                          <div className="flex gap-2">
                            <button onClick={()=>saveEdit(u)}
                                    className="px-4 py-2 rounded-xl bg-sia-navy text-white text-sm font-semibold hover:bg-sia-mid transition-colors">
                              Save
                            </button>
                            <button onClick={cancelEdit}
                                    className="px-4 py-2 rounded-xl border border-slate-200 text-slate-600 text-sm font-semibold hover:bg-slate-100 transition-colors">
                              Cancel
                            </button>
                          </div>
                        </div>
                        {isSelf && editForm.role !== 'admin' && (
                          <p className="text-xs text-amber-600 mt-2 flex items-center gap-1">
                            <span className="font-bold">Warning:</span> Changing your own role away from admin will remove your admin access.
                          </p>
                        )}
                      </td>
                    </tr>
                  )}
                </React.Fragment>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ── PASSWORD GATE ───────────────────────────────────────────────────── */
function PasswordGate({onAuth}) {
  const [pw, setPw] = useState('');
  const [error, setError] = useState(false);
  const check = () => {
    if (pw === 'RCESIA2026') {
      sessionStorage.setItem('rce_auth', btoa('RCESIA2026:rce-sia'));
      onAuth();
    } else {
      setError(true);
      setPw('');
    }
  };
  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#00205B'}}>
      <div style={{background:'white',borderRadius:'12px',padding:'40px',width:'360px',maxWidth:'90vw',boxShadow:'0 20px 60px rgba(0,0,0,0.35)'}}>
        <div style={{textAlign:'center',marginBottom:'28px'}}>
          <div style={{width:'52px',height:'52px',background:'#009DC4',borderRadius:'10px',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px',color:'white',fontWeight:'800',fontSize:'13px',letterSpacing:'1px'}}>SIA</div>
          <h1 style={{fontSize:'18px',fontWeight:'700',color:'#00205B',margin:'0 0 6px'}}>RCE Agent Tracker</h1>
          <p style={{fontSize:'13px',color:'#64748b',margin:0}}>Enter your access password to continue</p>
        </div>
        <input
          type="password"
          value={pw}
          onChange={e=>{setPw(e.target.value);setError(false);}}
          onKeyDown={e=>e.key==='Enter'&&check()}
          placeholder="Password"
          autoFocus
          style={{
            width:'100%',padding:'10px 12px',border:'1.5px solid',
            borderColor:error?'#ef4444':'#e2e8f0',borderRadius:'8px',
            fontSize:'14px',outline:'none',boxSizing:'border-box',
            marginBottom:error?'6px':'14px'
          }}
        />
        {error && <p style={{color:'#ef4444',fontSize:'12px',margin:'0 0 12px'}}>Incorrect password. Please try again.</p>}
        <button
          onClick={check}
          style={{width:'100%',padding:'11px',background:'#009DC4',color:'white',border:'none',borderRadius:'8px',fontSize:'14px',fontWeight:'600',cursor:'pointer'}}
        >
          Access Dashboard
        </button>
      </div>
    </div>
  );
}

/* ── LAYOUT WRAPPER ─────────────────────────────────────────────────── */
function Layout({user, children}) {
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const hash = useHash();
  const page = hash.replace(/#\/([^/]*).*/, '$1') || 'dashboard';
  const PAGE_TITLES = {
    dashboard:'Dashboard', agents:'All Agents', 'my-agents':'My Agents',
    backlog:'Backlog', validation:'Validation Queue', governance:'Governance',
    import:'Import Agents', 'admin/team':'Team Management'
  };
  const fullPath = hash.replace(/^#\//, '') || 'dashboard';

  return (
    <div className="flex min-h-screen bg-slate-50">
      <Sidebar user={user} open={sidebarOpen} onClose={()=>setSidebarOpen(false)}/>
      <div className="flex-1 min-w-0 flex flex-col">
        {/* Topbar */}
        <header className="bg-white border-b border-slate-100 px-4 py-3 flex items-center gap-3 sticky top-0 z-30">
          <button onClick={()=>setSidebarOpen(true)} className="lg:hidden text-slate-500 hover:text-slate-800">
            <IconMenu size={20}/>
          </button>
          <h2 className="text-sm font-bold text-slate-700">{PAGE_TITLES[fullPath] || PAGE_TITLES[page] || 'RCE Agent Tracker'}</h2>
          <div className="ml-auto flex items-center gap-2">
            <button
              onClick={()=>{
                fetch('/api/data')
                  .then(r=>r.json())
                  .then(data=>{
                    if(data.agents?.length)  lsSetLocal('rce_agents', data.agents);
                    if(data.users?.length)   lsSetLocal('rce_users',  data.users);
                    if(data.history?.length) lsSetLocal('rce_history',data.history);
                    window.location.reload();
                  })
                  .catch(()=>window.location.reload());
              }}
              className="hidden sm:inline-flex items-center gap-1 text-xs px-2 py-1 rounded border border-slate-200 text-slate-500 hover:text-slate-700 hover:border-slate-300 transition-colors"
              title="Pull latest data from server"
            >↻ Sync</button>
            {user && (
              <div className="flex items-center gap-2 text-xs text-slate-500">
                <div className="w-6 h-6 rounded-full flex items-center justify-center text-white text-[10px] font-bold"
                     style={{background:ROLE_COLORS[user.role]||'#475569'}}>
                  {initials(user.name)}
                </div>
                <span className="hidden sm:inline font-medium">{user.name.split(' ')[0]}</span>
                <span className="hidden sm:inline text-slate-300">|</span>
                <span className="hidden sm:inline capitalize text-slate-400">{user.role}</span>
              </div>
            )}
          </div>
        </header>
        <main className="flex-1 px-4 sm:px-6 py-6 overflow-y-auto">
          {children}
        </main>
      </div>
    </div>
  );
}

/* ── ROUTER ─────────────────────────────────────────────────────────── */
function AppRouter() {
  const hash = useHash();
  const [user, setUser] = useState(getSession());

  // Sync user from storage when hash changes (after login)
  useEffect(() => {
    setUser(getSession());
  }, [hash]);

  const path = hash.replace(/^#\//, '');
  const parts = path.split('/');
  const page = parts[0] || 'dashboard';

  if (page === 'login' || !user) {
    return (
      <>
        <LoginPage/>
        <Toast/>
      </>
    );
  }

  let content;
  if (page === 'dashboard') {
    content = <DashboardPage user={user}/>;
  } else if (page === 'agents' && parts[1]) {
    content = <AgentDetailPage user={user} agentId={parts[1]}/>;
  } else if (page === 'agents') {
    content = <AgentsPage user={user}/>;
  } else if (page === 'my-agents') {
    content = <MyAgentsPage user={user}/>;
  } else if (page === 'backlog') {
    content = <BacklogPage user={user}/>;
  } else if (page === 'validation') {
    content = <ValidationQueuePage user={user}/>;
  } else if (page === 'governance') {
    content = <GovernancePage/>;
  } else if (page === 'import') {
    content = <ImportPage user={user}/>;
  } else if (page === 'admin' && parts[1] === 'team') {
    content = user.role === 'admin' ? <TeamPage user={user}/> : <DashboardPage user={user}/>;
  } else {
    content = <DashboardPage user={user}/>;
  }

  return (
    <>
      <Layout user={user}>{content}</Layout>
      <Toast/>
    </>
  );
}

/* ── APP SHELL: password gate + API bootstrap ────────────────────────── */
function App() {
  const isAuthed = () => sessionStorage.getItem('rce_auth') === btoa('RCESIA2026:rce-sia');
  const [authenticated, setAuthenticated] = useState(isAuthed);
  const [apiLoading, setApiLoading] = useState(isAuthed);

  useEffect(() => {
    if (!authenticated) return;
    fetch('/api/data')
      .then(r => r.ok ? r.json() : {})
      .then(data => {
        if (data.agents?.length)  lsSetLocal('rce_agents',  data.agents);
        if (data.users?.length)   lsSetLocal('rce_users',   data.users);
        if (data.history?.length) lsSetLocal('rce_history', data.history);
      })
      .catch(() => {})
      .finally(() => { seed(); setApiLoading(false); });
  }, [authenticated]);

  if (!authenticated) {
    return <PasswordGate onAuth={() => { setAuthenticated(true); setApiLoading(true); }}/>;
  }
  if (apiLoading) {
    return (
      <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#00205B'}}>
        <div style={{textAlign:'center',color:'white'}}>
          <div style={{fontSize:'28px',marginBottom:'8px',opacity:.5}}>⟳</div>
          <div style={{fontSize:'13px',opacity:.7,letterSpacing:'.3px'}}>Loading dashboard…</div>
        </div>
      </div>
    );
  }
  return <AppRouter/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
